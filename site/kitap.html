<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERRIDIA — Kitap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/kitap.css">
  <link rel="stylesheet" href="assets/css/yazdir.css">
</head>
<body>

  <div id="ilerleme"></div>

  <header class="okuyucu-bar">
    <a class="geri" href="index.html">← VERRIDIA</a>
    <div class="konum" id="bar-konum"></div>
    <div class="araclar">
      <button id="btn-kenar" title="İçindekiler">☰</button>
      <button id="btn-kucult" title="Yazıyı küçült">A−</button>
      <button id="btn-buyut" title="Yazıyı büyüt">A+</button>
      <button id="btn-tema" title="Tema değiştir">☀</button>
      <button id="btn-pdf" title="PDF indir">⤓</button>
    </div>
  </header>

  <div class="duzen">
    <aside id="kenar">
      <div class="kenar-ic"></div>
    </aside>

    <main id="icerik">
      <article class="sayfa">
        <header class="bolum-ust">
          <div class="kisim-etiketi" id="kisim-etiketi"></div>
          <h1 id="bolum-baslik"></h1>
          <div class="pov" id="bolum-pov"></div>
          <div class="sus">✦ ✦ ✦</div>
        </header>

        <div class="govde" id="govde"></div>

        <nav class="gezinme">
          <button id="btn-onceki">
            <span class="yon">← Önceki</span>
            <span class="hedef"></span>
          </button>
          <button id="btn-sonraki">
            <span class="yon">Sonraki →</span>
            <span class="hedef"></span>
          </button>
        </nav>
      </article>
    </main>
  </div>

  <!-- PDF: seçim penceresi + gizli yazdırma kapsayıcısı -->
  <div class="pdf-modal" id="pdf-modal" hidden>
    <div class="pdf-modal-ic">
      <button class="pdf-kapat" id="pdf-kapat" title="Kapat">✕</button>
      <h2>Kitabı PDF indir</h2>
      <p class="pdf-not">Seçtikten sonra tarayıcının yazdırma penceresi açılır. Hedef olarak <b>"PDF olarak kaydet"</b>i seçip kaydet.</p>
      <div class="pdf-secenekler">
        <button data-kitap="0">Birinci Kitap</button>
        <button data-kitap="1">İkinci Kitap</button>
        <button data-kitap="2">Üçüncü Kitap</button>
        <button class="hepsi" data-kitap="all">Üçü Birden (Tüm Üçleme)</button>
      </div>
    </div>
  </div>
  <div class="pdf-hazir" id="pdf-hazir">Hazırlanıyor…</div>
  <div id="pdf-root"></div>

  <script src="assets/js/kitap-data.js"></script>
  <script src="assets/js/okuyucu.js"></script>
  <script src="assets/js/indir.js"></script>
</body>
</html>
